<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 Not Found</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      color: #f8fafc;
      font-family: Arial, sans-serif;
      text-align: center;
    }
    .page {
      max-width: 480px;
      padding: 24px;
    }
    h1 {
      font-size: 4rem;
      margin: 0;
      letter-spacing: -0.05em;
    }
    p {
      margin: 1.5rem 0;
      line-height: 1.6;
      color: #cbd5e1;
    }
    a {
      color: #7dd3fc;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="page">
    <h1>404</h1>
    <p>Sorry, the page you’re looking for can’t be found.</p>
    <p><a href="/">Return to Home</a></p>
  </div>
</body>
</html>
